name: Music & Karaoke Trends Analysis (15min)

on:
  schedule:
    # 15分ごとに実行 (UTC) - GitHub Actionsの最小スケジュール間隔は5分
    - cron: "0,15,30,45 * * * *"
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # music_trends_analysis.json をコミット・プッシュするために必要

jobs:
  analyze-music-trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect & analyze music/karaoke trends with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python music_karaoke_analyzer.py

      - name: Commit and push analysis results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add music_trends_analysis.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat: update music/karaoke trends analysis $(date -u '+%Y-%m-%dT%H:%M')"
            git push
          fi

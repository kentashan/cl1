name: Daily Japan Trends

on:
  schedule:
    # 毎日 JST 09:00 (UTC 00:00) に実行
    - cron: "0 0 * * *"
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # trends.json をコミット・プッシュするために必要

jobs:
  fetch-trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Japan trends
        run: python fetch_trends.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      - name: Commit and push updated trends
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trends.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Japan trends $(date -u '+%Y-%m-%d')"
            git push
          fi
